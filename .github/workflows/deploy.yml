name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-supabase:
    name: Deploy Supabase Migrations + Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env: { SUPABASE_ACCESS_TOKEN: '${{ secrets.SUPABASE_ACCESS_TOKEN }}' }
      - run: supabase db push
        env: { SUPABASE_ACCESS_TOKEN: '${{ secrets.SUPABASE_ACCESS_TOKEN }}' }
      - run: |
          supabase functions deploy turn-credentials
          supabase functions deploy moderate-message
          supabase functions deploy update-location
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - run: |
          supabase secrets set OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          supabase secrets set TURN_SECRET=${{ secrets.TURN_SECRET }}
        env: { SUPABASE_ACCESS_TOKEN: '${{ secrets.SUPABASE_ACCESS_TOKEN }}' }

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: deploy-supabase
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bunx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
